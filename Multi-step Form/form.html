<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-step Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="main-container">
        <form id="form1">
            <h3>CREATE ACCOUNT</h3>
            <label for="email"></label>
            <input type="text" id="email" placeholder="Enter your Email" required>
            <br><br>
            <label for="password"></label>
            <input type="password" id="password" placeholder="Enter your Password" required>
            <br><br>
            <label for="confirm"></label>
            <input type="password" id="confirm" placeholder="Confirm Password" required>
            
            <div class="btn-container">
                <button type="button" id="next1">Next</button>
            </div>
        </form>

        
        <form id="form2">
            <h3>SOCIAL MEDIA HANDLES</h3>
            <label for="email"></label>
            <input type="text" id="email" placeholder="Enter your Snapchat" required>
            <br><br>
            <label for="password"></label>
            <input type="text" id="password" placeholder="Enter your Instagram" required>
            <br><br>
            <label for="linkedin"></label>
            <input type="text" id="linkedin" placeholder="Enter your LinkedIn" required>
            
            <div class="btn-container">
                <button type="button" id="back1">Back</button>
                <button type="button" id="next2">Next</button>
            </div>
        </form>
        <form id="form3">
            <h3>PERSONAL INFORMATION</h3>
            <label for="lastname"></label>
            <input type="text" id="lastname" placeholder="Last Name" required>
            <br><br>
            <label for="firstname"></label>
            <input type="text" id="firstname" placeholder="First Name" required>
            <br><br>
            <label for="phone"></label>
            <input type="tel" id="phone" placeholder="Phone Number" maxlength="11">
            
            <div class="btn-container">
                <button type="button" id="back2">Back</button>
                <button type="submit">Submit</button>
            </div>
        </form>
        <div id="step-bar">
            <div id="progress-bar"></div>
            <div class="step-column"><small>Step 1</small></div>
            <div class="step-column"><small>Step 2</small></div>
            <div class="step-column"><small>Step 3</small></div>
        </div>
    </div>
</body>
<script src="form.js"></script>
</html>
